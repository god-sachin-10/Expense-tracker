<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpenseTracker — Login</title>
    <meta name="description" content="Sign in to your ExpenseTracker account to manage your income and expenses." />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-circle"><i class="fa-solid fa-wallet"></i></div>
                <h1>Expense<span style="color:var(--accent-light)">Tracker</span></h1>
                <p>Manage your money smarter, every day.</p>
            </div>

            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="loginForm" id="tabLogin">Sign In</button>
                    <button class="auth-tab" data-tab="registerForm" id="tabRegister">Create Account</button>
                </div>

                <!-- LOGIN FORM -->
                <form class="auth-form active" id="loginForm">
                    <div id="login_error" class="alert alert-danger hidden" style="margin-bottom:16px;"></div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com"
                                required autocomplete="email" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••"
                                required autocomplete="current-password" />
                            <i class="fa-solid fa-eye toggle-pw" style="cursor:pointer;"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary auth-submit">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                    </button>

                    <div style="text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-muted);">
                        Don't have an account? <a href="#"
                            onclick="document.getElementById('tabRegister').click();return false;"
                            style="color:var(--accent-light);">Create one →</a>
                    </div>
                </form>

                <!-- REGISTER FORM -->
                <form class="auth-form" id="registerForm">
                    <div id="register_error" class="alert alert-danger hidden" style="margin-bottom:16px;"></div>

                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="regName" class="form-control" placeholder="John Doe" required
                                autocomplete="name" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="regEmail" class="form-control" placeholder="you@example.com"
                                required autocomplete="email" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters"
                                required />
                            <i class="fa-solid fa-eye toggle-pw" style="cursor:pointer;"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password"
                                required />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary auth-submit">
                        <i class="fa-solid fa-user-plus"></i> Create Account
                    </button>

                    <div style="text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-muted);">
                        Already have an account? <a href="#"
                            onclick="document.getElementById('tabLogin').click();return false;"
                            style="color:var(--accent-light);">Sign in →</a>
                    </div>
                </form>
            </div>

            <p style="text-align:center;margin-top:20px;font-size:0.78rem;color:var(--text-muted);">
                🔒 Your data is stored locally and never sent to any server.
            </p>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAuthPage);
    </script>
</body>

</html>
