<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports — ExpenseTracker</title>
    <meta name="description" content="Generate weekly and monthly financial reports. Export as CSV or PDF." />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="fa-solid fa-wallet" style="color:#fff;"></i></div>
                <div class="logo-text">Expense<span>Tracker</span></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a class="nav-item" href="transactions.html"><i class="fa-solid fa-arrow-right-arrow-left"></i>
                    Transactions</a>
                <a class="nav-item" href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <div class="nav-section-title" style="margin-top:12px;">Planning</div>
                <a class="nav-item" href="budget.html"><i class="fa-solid fa-piggy-bank"></i> Budget</a>
                <a class="nav-item active" href="reports.html"><i class="fa-solid fa-file-chart-column"></i> Reports</a>
            </nav>
            <div class="sidebar-user">
                <div class="user-avatar" id="sidebarAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">User</div>
                    <div class="user-email" id="sidebarUserEmail">user@email.com</div>
                </div>
                <button class="btn-logout" id="logoutBtn" title="Logout"><i
                        class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header fade-in">
                <h1><i class="fa-solid fa-file-chart-column"
                        style="color:var(--accent-light);margin-right:10px;"></i>Reports</h1>
                <p>Generate and export your financial reports.</p>
            </div>

            <!-- Controls -->
            <div class="section-card fade-in" style="padding:20px 24px;">
                <div class="d-flex align-center justify-between flex-wrap gap-3">
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary report-mode-btn" data-mode="monthly" id="btnMonthly">
                            <i class="fa-solid fa-calendar-days"></i> Monthly
                        </button>
                        <button class="btn btn-secondary report-mode-btn" data-mode="weekly" id="btnWeekly">
                            <i class="fa-solid fa-calendar-week"></i> Weekly
                        </button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-secondary" id="btnExportCSV">
                            <i class="fa-solid fa-file-csv"></i> Export CSV
                        </button>
                        <button class="btn btn-primary" id="btnExportPDF">
                            <i class="fa-solid fa-file-pdf"></i> Export PDF
                        </button>
                    </div>
                </div>
            </div>

            <!-- Report Content -->
            <div class="section-card fade-in">
                <div id="reportContent">
                    <div class="empty-state"><i class="fa-solid fa-file-chart-column"></i>
                        <p>Loading report...</p>
                    </div>
                </div>
            </div>

            <!-- Export Info -->
            <div class="section-card fade-in" style="padding:16px 24px;">
                <div class="d-flex gap-2 align-center" style="font-size:0.82rem;color:var(--text-muted);">
                    <i class="fa-solid fa-circle-info" style="color:var(--cyan);"></i>
                    <span>CSV exports all transactions. PDF includes a summary and full transaction history (up to 60
                        items per page).</span>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reports.js"></script>
    <script>document.addEventListener('DOMContentLoaded', initReportsPage);</script>
</body>

</html>
