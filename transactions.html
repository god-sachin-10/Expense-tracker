<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions — ExpenseTracker</title>
    <meta name="description" content="View, add, edit, and filter all your income and expense transactions." />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>

<body>

    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="fa-solid fa-wallet" style="color:#fff;"></i></div>
                <div class="logo-text">Expense<span>Tracker</span></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a class="nav-item active" href="transactions.html"><i class="fa-solid fa-arrow-right-arrow-left"></i>
                    Transactions</a>
                <a class="nav-item" href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <div class="nav-section-title" style="margin-top:12px;">Planning</div>
                <a class="nav-item" href="budget.html"><i class="fa-solid fa-piggy-bank"></i> Budget</a>
                <a class="nav-item" href="reports.html"><i class="fa-solid fa-file-chart-column"></i> Reports</a>
            </nav>
            <div class="sidebar-user">
                <div class="user-avatar" id="sidebarAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">User</div>
                    <div class="user-email" id="sidebarUserEmail">user@email.com</div>
                </div>
                <button class="btn-logout" id="logoutBtn" title="Logout"><i
                        class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <div class="page-header fade-in d-flex align-center justify-between flex-wrap">
                <div>
                    <h1><i class="fa-solid fa-arrow-right-arrow-left"
                            style="color:var(--accent-light);margin-right:10px;"></i>Transactions</h1>
                    <p>Track and manage all your income and expenses.</p>
                </div>
                <button class="btn btn-primary" id="addTxnBtn"><i class="fa-solid fa-plus"></i> Add Transaction</button>
            </div>

            <!-- Filters -->
            <div class="filter-bar fade-in">
                <div class="filter-group">
                    <label>From</label>
                    <input type="date" id="filterFrom" class="form-control" />
                </div>
                <div class="filter-group">
                    <label>To</label>
                    <input type="date" id="filterTo" class="form-control" />
                </div>
                <div class="filter-group">
                    <label>Category</label>
                    <select id="filterCat" class="form-control">
                        <option value="all">All Categories</option>
                        <option>Food</option>
                        <option>Travel</option>
                        <option>Bills</option>
                        <option>Fuel</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Type</label>
                    <select id="filterType" class="form-control">
                        <option value="all">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="filter-group" style="justify-content:flex-end;">
                    <button class="btn btn-secondary" id="clearFilters"><i class="fa-solid fa-xmark"></i> Clear</button>
                </div>
            </div>

            <!-- Table -->
            <div class="section-card fade-in">
                <div class="section-card-header">
                    <h3><i class="fa-solid fa-list" style="color:var(--cyan);margin-right:8px;"></i>Transaction History
                        <span id="txnCount" style="font-size:0.8rem;color:var(--text-muted);font-weight:400;"></span>
                    </h3>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Transaction</th>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="txnTableBody">
                            <tr>
                                <td colspan="6">
                                    <div class="empty-state"><i class="fa-solid fa-receipt"></i>
                                        <p>No transactions yet.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Transaction Modal -->
    <div class="modal-overlay" id="txnModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add Transaction</h2>
                <button class="btn-close" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <form id="txnForm">
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <div class="type-toggle">
                        <button type="button" class="type-btn expense active" data-type="expense"><i
                                class="fa-solid fa-arrow-trend-down"></i> Expense</button>
                        <button type="button" class="type-btn income" data-type="income"><i
                                class="fa-solid fa-arrow-trend-up"></i> Income</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" id="txnTitle" class="form-control" placeholder="e.g. Grocery shopping"
                        required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Amount (₹) *</label>
                        <input type="number" id="txnAmount" class="form-control" placeholder="0.00" min="0.01"
                            step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date *</label>
                        <input type="date" id="txnDate" class="form-control" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="txnCategory" class="form-control">
                        <option>Food</option>
                        <option>Travel</option>
                        <option>Bills</option>
                        <option>Fuel</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Description <span
                            style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
                    <textarea id="txnDescription" class="form-control" rows="2" placeholder="Add a note..."
                        style="resize:vertical;"></textarea>
                </div>

                <div class="d-flex gap-2" style="margin-top:8px;">
                    <button type="button" class="btn btn-secondary w-100" id="cancelModal"
                        onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-check"></i> Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/transactions.js"></script>
    <script>document.addEventListener('DOMContentLoaded', initTransactionsPage);</script>
</body>

</html>
