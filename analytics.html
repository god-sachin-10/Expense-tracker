<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics — ExpenseTracker</title>
    <meta name="description" content="Visualize your spending patterns with interactive charts and analytics." />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>

    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="fa-solid fa-wallet" style="color:#fff;"></i></div>
                <div class="logo-text">Expense<span>Tracker</span></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a class="nav-item" href="transactions.html"><i class="fa-solid fa-arrow-right-arrow-left"></i>
                    Transactions</a>
                <a class="nav-item active" href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <div class="nav-section-title" style="margin-top:12px;">Planning</div>
                <a class="nav-item" href="budget.html"><i class="fa-solid fa-piggy-bank"></i> Budget</a>
                <a class="nav-item" href="reports.html"><i class="fa-solid fa-file-chart-column"></i> Reports</a>
            </nav>
            <div class="sidebar-user">
                <div class="user-avatar" id="sidebarAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">User</div>
                    <div class="user-email" id="sidebarUserEmail">user@email.com</div>
                </div>
                <button class="btn-logout" id="logoutBtn" title="Logout"><i
                        class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header fade-in">
                <h1><i class="fa-solid fa-chart-line" style="color:var(--accent-light);margin-right:10px;"></i>Analytics
                </h1>
                <p>Visualize your financial patterns and spending habits.</p>
            </div>

            <div class="charts-grid">
                <!-- Monthly Spending -->
                <div class="chart-card fade-in delay-1">
                    <h3><i class="fa-solid fa-chart-bar" style="color:var(--accent-light);margin-right:8px;"></i>Monthly
                        Income vs Expense</h3>
                    <div class="chart-canvas-wrap">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>

                <!-- Category Breakdown -->
                <div class="chart-card fade-in delay-2">
                    <h3><i class="fa-solid fa-chart-pie" style="color:var(--cyan);margin-right:8px;"></i>Spending by
                        Category</h3>
                    <div class="chart-canvas-wrap">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <!-- Income vs Expense Line -->
                <div class="chart-card fade-in delay-3">
                    <h3><i class="fa-solid fa-chart-line" style="color:var(--income);margin-right:8px;"></i>Income vs
                        Expense Trend</h3>
                    <div class="chart-canvas-wrap">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>

                <!-- Weekly -->
                <div class="chart-card fade-in delay-4">
                    <h3><i class="fa-solid fa-calendar-week" style="color:var(--warning);margin-right:8px;"></i>Weekly
                        Overview (Last 4 Weeks)</h3>
                    <div class="chart-canvas-wrap">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/analytics.js"></script>
    <script>document.addEventListener('DOMContentLoaded', initAnalyticsPage);</script>
</body>

</html>
